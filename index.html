<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba: Cita → Calendario / WhatsApp</title>
<style>
  :root{--rose-gold:#B76E79;--blush:#F7E7E8;--ink:#2B2024;--ok:#3C7A5B;--warn:#B4432F;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:var(--blush);color:var(--ink);padding:24px 16px 60px;}
  .card{max-width:420px;margin:0 auto;background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(183,110,121,0.15);}
  h1{font-size:19px;margin:0 0 4px;color:var(--rose-gold);}
  p.sub{margin:0 0 20px;font-size:13px;color:#8a7378;}
  label{display:block;font-size:12px;font-weight:600;margin:14px 0 4px;color:var(--ink);}
  input{width:100%;padding:10px 12px;border:1px solid #e4cfd2;border-radius:10px;font-size:15px;background:#fffaf9;}
  button{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:600;margin-top:14px;cursor:pointer;}
  .btn-primary{background:var(--rose-gold);color:#fff;}
  .btn-secondary{background:#fff;color:var(--rose-gold);border:1.5px solid var(--rose-gold);}
  .result{margin-top:16px;padding:12px;border-radius:10px;font-size:13px;line-height:1.5;display:none;}
  .result.show{display:block;}
  .result.ok{background:#e8f3ee;color:var(--ok);}
  .result.warn{background:#fbe9e5;color:var(--warn);}
  .divider{border-top:1px dashed #e4cfd2;margin:22px 0;}
  .step-label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:#b08a8f;font-weight:700;margin-bottom:6px;}
</style>
</head>
<body>
<div class="card">
  <h1>Prueba tecnica - Rosangel's Nails</h1>
  <p class="sub">Verificamos 2 cosas: guardar en tu Calendario, y compartir el evento por WhatsApp.</p>

  <label>Nombre de la clienta</label>
  <input id="nombre" value="Clienta de prueba">

  <label>Telefono (con codigo de pais, sin +)</label>
  <input id="telefono" value="1XXXXXXXXXX">

  <label>Fecha</label>
  <input id="fecha" type="date">

  <label>Hora inicio</label>
  <input id="hora" type="time" value="13:00">

  <label>Lugar</label>
  <input id="lugar" value="508 Sang Saloon Rd, Cedar Park, TX">

  <div class="divider"></div>

  <div class="step-label">Paso 1 - Tu calendario (Apple)</div>
  <button class="btn-primary" onclick="agregarACalendario()">Añadir a mi Calendario</button>
  <div id="resultado1" class="result"></div>

  <div class="divider"></div>

  <div class="step-label">Paso 2 - Enviar a la clienta por WhatsApp</div>
  <button class="btn-secondary" onclick="compartirWhatsApp()">Compartir evento (archivo)</button>
  <div id="resultado2" class="result"></div>

  <div class="divider"></div>
  <div class="step-label">Debug</div>
  <div id="debug" style="background:#f3f3f3;border-radius:8px;padding:10px;font-size:11px;font-family:monospace;white-space:pre-wrap;min-height:60px;color:#333;">Toca cualquier boton...</div>

</div>

<script>
function log(msg){
  const d = document.getElementById('debug');
  d.textContent += '\n[' + new Date().toLocaleTimeString() + '] ' + msg;
  d.scrollTop = d.scrollHeight;
}
window.onerror = function(msg, src, line){ log('ERROR: ' + msg + ' (linea ' + line + ')'); return false; };
function pad(n){ return n.toString().padStart(2,'0'); }

function construirICS(){
  const nombre = document.getElementById('nombre').value || 'Cita';
  const fecha = document.getElementById('fecha').value;
  const hora = document.getElementById('hora').value;
  const lugar = document.getElementById('lugar').value;
  if(!fecha || !hora){ alert('Completa fecha y hora'); return null; }
  const inicio = new Date(fecha + 'T' + hora + ':00');
  const fin = new Date(inicio.getTime() + 60*60*1000);
  const fmt = (d) => d.getUTCFullYear() + pad(d.getUTCMonth()+1) + pad(d.getUTCDate()) + 'T' + pad(d.getUTCHours()) + pad(d.getUTCMinutes()) + '00Z';
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//RosangelsNails//Cita//ES','BEGIN:VEVENT',
    'UID:' + Date.now() + '@rosangelsnails','DTSTAMP:' + fmt(new Date()),'DTSTART:' + fmt(inicio),
    'DTEND:' + fmt(fin),'SUMMARY:Cita - ' + nombre,'LOCATION:' + lugar,
    'DESCRIPTION:Cita en Rosangels Nails','END:VEVENT','END:VCALENDAR'].join('\r\n');
}

function agregarACalendario(){
  log('Boton 1 tocado');
  const ics = construirICS();
  if(!ics) return;
  try{
    const blob = new Blob([ics], {type:'text/calendar'});
    const url = URL.createObjectURL(blob);
    log('Navegando a la URL...');
    window.location.href = url;
    log('Navegacion ejecutada');
  }catch(e){ log('EXCEPCION: ' + e.message); }
  const r = document.getElementById('resultado1');
  r.className = 'result show ok';
  r.innerHTML = 'Revisa si Safari ofrecio abrir con Calendario.';
}

async function compartirWhatsApp(){
  log('Boton 2 tocado');
  const ics = construirICS();
  if(!ics) return;
  const telefono = document.getElementById('telefono').value.replace(/\D/g,'');
  const nombre = document.getElementById('nombre').value;
  const fecha = document.getElementById('fecha').value;
  const hora = document.getElementById('hora').value;
  const lugar = document.getElementById('lugar').value;
  const file = new File([ics], 'cita.ics', {type:'text/calendar'});
  const r = document.getElementById('resultado2');
  const puede = navigator.canShare && navigator.canShare({files:[file]});
  log('canShare = ' + puede);
  if(puede){
    try{
      await navigator.share({files:[file], title:'Cita - ' + nombre, text:'Hola ' + nombre});
      r.className = 'result show ok';
      r.innerHTML = 'Menu de compartir abierto con archivo.';
    }catch(e){
      log('share fallo: ' + e.message);
      abrirWhatsAppTexto(telefono, nombre, fecha, hora, lugar);
    }
  } else {
    abrirWhatsAppTexto(telefono, nombre, fecha, hora, lugar);
  }
}
